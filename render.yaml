services:
  - type: web
    name: stocker-backend
    env: python
    buildCommand: pip install -e .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL_ALLOWLIST
        sync: false
      - key: CORS_ORIGINS
        sync: false
